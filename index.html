<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRK Creative</title>
    <style>
        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }

        .section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; scroll-snap-align: start; padding: 20px; text-align: center; border-bottom: 1px solid #222; }

        /* --- MARQUEE INFINI (Fluidité corrigée) --- */
        .marquee-wrapper { width: 100%; overflow: hidden; position: relative; padding: 40px 0; }
        .marquee-track { display: flex; animation: marquee 20s linear infinite; width: fit-content; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .card { width: 250px; height: 150px; background: #111; margin: 0 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #333; }

        /* --- SÉLECTEUR DE PAYS (STYLE APPLE) --- */
        .country-selector { margin-top: 50px; position: relative; }
        .trigger { cursor: pointer; color: #86868b; font-size: 0.9rem; transition: color 0.3s; }
        .trigger:hover { color: #fff; }
        
        .country-menu { 
            display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            background: #111; border: 1px solid #333; padding: 25px; width: 600px; 
            border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 100;
        }
        .country-menu.active { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: left; }
        .cat h4 { color: #0071e3; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; }
        .country-item { display: block; color: #fff; font-size: 0.85rem; padding: 5px 0; cursor: pointer; }
        .country-item:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <section class="section">
        <h1>BRK Creative</h1>
        <p>L'excellence visuelle.</p>
    </section>

    <section class="section">
        <h2>Nos Projets</h2>
        <div class="marquee-wrapper">
            <div class="marquee-track" id="marquee">
                <!-- Les éléments seront dupliqués par JS pour la boucle infinie -->
                <div class="card">Projet A</div><div class="card">Projet B</div><div class="card">Projet C</div>
                <div class="card">Projet A</div><div class="card">Projet B</div><div class="card">Projet C</div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="country-selector">
            <div class="trigger" onclick="toggleMenu()">
                <span id="displayCountry">Gabon</span> ▾
            </div>
            <div class="country-menu" id="countryMenu">
                <div class="cat"><h4>Afrique</h4>
                    <span class="country-item" onclick="pick('Gabon')">Gabon</span>
                    <span class="country-item" onclick="pick('Sénégal')">Sénégal</span>
                </div>
                <div class="cat"><h4>Europe</h4>
                    <span class="country-item" onclick="pick('France')">France</span>
                    <span class="country-item" onclick="pick('Suisse')">Suisse</span>
                </div>
                <div class="cat"><h4>Amérique</h4>
                    <span class="country-item" onclick="pick('Canada')">Canada</span>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Menu Pays
        function toggleMenu() { document.getElementById('countryMenu').classList.toggle('active'); }
        function pick(c) {
            document.getElementById('displayCountry').innerText = c;
            toggleMenu();
        }

        // Fermer le menu si on clique ailleurs
        window.onclick = function(event) {
            if (!event.target.matches('.trigger')) {
                document.getElementById('countryMenu').classList.remove('active');
            }
        }
    </script>
</body>
</html>
